name: PostHog Watcher

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: Watcher mode to run
        required: false
        default: auto
        type: choice
        options:
          - auto
          - triage
          - investigate
          - fix
          - commit-review
          - sweep
      issue-number:
        description: Issue or PR number to process, except in sweep or commit-review mode
        required: false
        type: string
      commit-sha:
        description: Commit SHA to review in commit-review mode; defaults to the workflow SHA
        required: false
        type: string
      max-sweep-items:
        description: Maximum open issues to process in sweep mode
        required: false
        default: '10'
        type: string
      sweep-query:
        description: GitHub issue search query suffix for sweep mode
        required: false
        default: 'is:issue is:open archived:false'
        type: string
  schedule:
    - cron: '17 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || inputs['issue-number'] || inputs['commit-sha'] || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watcher:
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.mode != 'sweep')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: PostHog/posthog-watcher-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number || inputs['issue-number'] }}
          mode: ${{ inputs.mode || 'auto' }}
          model: openai/gpt-5.5:medium
          allow-fix: 'true'
          allow-close: 'true'
          dry-run: 'false'
          labels: bug,documentation,enhancement,question,needs-info,good-first-issue,duplicate
          managed-label-prefix: 'posthog-watcher:'
          sync-managed-labels: 'true'
          max-comments: '50'
          max-changed-files: '5'
          max-diff-lines: '500'
          max-repair-attempts: '3'
          max-related-items: '10'
          commit-sha: ${{ inputs['commit-sha'] || github.sha }}
          state-enabled: 'true'
          state-branch: posthog-watcher-state

  sweep:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'sweep')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: PostHog/posthog-watcher-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: sweep
          model: openai/gpt-5.5:medium
          allow-fix: 'true'
          allow-close: 'true'
          dry-run: 'false'
          labels: bug,documentation,enhancement,question,needs-info,good-first-issue,duplicate
          managed-label-prefix: 'posthog-watcher:'
          sync-managed-labels: 'true'
          max-comments: '50'
          max-changed-files: '5'
          max-diff-lines: '500'
          max-repair-attempts: '3'
          max-related-items: '10'
          max-sweep-items: ${{ inputs['max-sweep-items'] || '10' }}
          sweep-query: ${{ inputs['sweep-query'] || 'is:issue is:open archived:false' }}
          state-enabled: 'true'
          state-branch: posthog-watcher-state
