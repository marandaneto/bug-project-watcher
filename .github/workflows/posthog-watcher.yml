name: PostHog Watcher

on:
  issues:
    types: [opened, reopened, edited]
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to process
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: PostHog/posthog-watcher-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number || inputs['issue-number'] }}
          model: openai/gpt-5.5:medium
          allow-fix: 'true'
